<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drag & Drop Upload</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Drag & Drop File Upload</h1>

  <div
    id="drop-zone"
    class="drop-zone"
  >
    Drop Image Here
  </div>

  <input
    type="file"
    id="fileInput"
    accept="image/*"
    placeholder="..."
  >

  <div
    id="preview"
    class="preview"
  ></div>

  <script src="script.js"></script>

</body>
</html>
