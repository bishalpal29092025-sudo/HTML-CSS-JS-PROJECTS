<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Expense Tracker 💰</h1>
      <div class="form">
        <input type="text" id="text" placeholder="Enter description" />
        <input
          type="number"
          id="amount"
          placeholder="Enter amount (+income / -expense)"
        />
        <button id="addBtn">Add Transaction</button>
      </div>
      <h3>Transactions</h3>

      <ul id="list"></ul>
    </div>
    <script src="script.js"></script>
  </body>
</html>
